name: Package

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the build number (commit count) is right

      - name: Run tests
        run: swift test

      - name: Import signing identity
        env:
          P12_BASE64: ${{ secrets.SLOUCH_SIGN_P12 }}
          P12_PASSWORD: ${{ secrets.SLOUCH_SIGN_P12_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No signing secret configured; build will be ad-hoc signed."
            exit 0
          fi
          echo "$P12_BASE64" | base64 -d > sign.p12
          security create-keychain -p ci ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security unlock-keychain -p ci ci.keychain
          security import sign.p12 -k ci.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s ci.keychain
          # Let codesign use the key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k ci ci.keychain > /dev/null
          # Self-signed cert must be trusted or codesign rejects the identity.
          openssl pkcs12 -in sign.p12 -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out cert.pem
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain cert.pem
          rm sign.p12

      - name: Package Slouch.app
        run: ./Scripts/build-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent Slouch.app Slouch.app.zip

      - uses: actions/upload-artifact@v5
        with:
          name: Slouch.app
          path: Slouch.app.zip

      - name: Update rolling "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest Slouch.app.zip \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Latest build" \
            --notes "Auto-built from \`${GITHUB_SHA:0:7}\`. Ad-hoc signed: grant Accessibility again after replacing the app."
