name: Package

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the build number (commit count) is right

      - name: Run tests
        run: swift test

      - name: Import signing identity
        env:
          P12_BASE64: ${{ secrets.SLOUCH_SIGN_P12 }}
          P12_PASSWORD: ${{ secrets.SLOUCH_SIGN_P12_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No signing secret configured; build will be ad-hoc signed."
            exit 0
          fi
          echo "$P12_BASE64" | base64 -d > sign.p12
          security create-keychain -p ci ci.keychain
          security set-keychain-settings -lut 21600 ci.keychain
          security unlock-keychain -p ci ci.keychain
          security import sign.p12 -k ci.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s ci.keychain
          # Let codesign use the key without a UI prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k ci ci.keychain > /dev/null
          # Self-signed cert must be trusted or codesign rejects the identity.
          openssl pkcs12 -in sign.p12 -clcerts -nokeys -passin "pass:$P12_PASSWORD" -out cert.pem
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain cert.pem
          rm sign.p12

      - name: Package Slouch.app
        run: ./Scripts/build-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent Slouch.app Slouch.app.zip

      - uses: actions/upload-artifact@v5
        with:
          name: Slouch.app
          path: Slouch.app.zip

      - name: Create build release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUILD=$(git rev-list --count HEAD)
          SHORT=${GITHUB_SHA:0:7}
          TAG="build-${BUILD}-${SHORT}"
          TITLE="Build ${BUILD} (${SHORT})"

          # Branch builds are prereleases: /releases/latest skips them, so
          # the in-app updater never offers a test build as an upgrade.
          PRERELEASE=""
          if [ "$GITHUB_REF_NAME" != "master" ]; then
            TAG="${GITHUB_REF_NAME}-${TAG}"
            TITLE="${TITLE} [${GITHUB_REF_NAME}]"
            PRERELEASE="--prerelease"
          fi

          # Changes since the previous release (fall back to the last 10 commits).
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' || true)
          if [ -n "$PREV_TAG" ] && git rev-parse -q --verify "$PREV_TAG" > /dev/null; then
            CHANGES=$(git log --pretty='- %s' "$PREV_TAG"..HEAD)
          else
            CHANGES=$(git log --pretty='- %s' -10)
          fi

          {
            echo "**⬇ 下载: [Slouch.app.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Slouch.app.zip)**"
            echo
            echo "## Changes"
            echo "${CHANGES:-- (no new commits)}"
          } > notes.md

          gh release create "$TAG" Slouch.app.zip \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file notes.md $PRERELEASE

          # One-time cleanup of the old rolling release; no-op afterwards.
          gh release delete latest --yes --cleanup-tag || true

          # Keep the 10 newest releases.
          gh release list --limit 100 --json tagName --jq '.[10:][].tagName' |
          while read -r tag; do
            gh release delete "$tag" --yes --cleanup-tag
          done
